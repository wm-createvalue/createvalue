document.addEventListener('DOMContentLoaded', async function() {

  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

-toggle span {\n    display: block; width: 22px; height: 1.5px; background: var(--navy);\n    transition: all 0.25s;\n  }\n\n  /* ─── BUTTONS ─── */\n  .btn {\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.68rem; font-weight: 700;\n    letter-spacing: 0.16em; text-transform: uppercase;\n    padding: 0.9rem 1.85rem; text-decoration: none;\n    border-radius: 2px; display: inline-block;\n    transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;\n    border: 1px solid transparent;\n  }\n  .btn:hover { transform: translateY(-1px); }\n  .btn--teal   { background: var(--teal); color: var(--white); }\n  .btn--teal:hover { background: var(--navy); }\n  .btn--accent { background: var(--teal-light); color: var(--navy); }\n  .btn--accent:hover { background: var(--teal); color: var(--white); }\n  .btn--ghost-light {\n    background: transparent; color: rgba(255,255,255,0.7);\n    border-color: rgba(255,255,255,0.22);\n  }\n  .btn--ghost-light:hover { color: var(--white); border-color: rgba(255,255,255,0.5); }\n  .btn--outline-navy {\n    background: transparent; color: var(--navy);\n    border: 1.5px solid var(--navy);\n  }\n  .btn--outline-navy:hover { background: var(--navy); color: var(--white); }\n\n  /* ─── HERO ─── */\n  .hero {\n    background: var(--navy);\n    position: relative; overflow: hidden;\n    min-height: 88vh; display: flex; align-items: center;\n    padding: 4rem 0;\n  }\n  .hero-bg {\n    position: absolute; inset: 0;\n    background-image: url(\"8b62ab66-0fc7-4827-9503-d9198ac8452c\");\n    background-size: cover;\n    background-position: center right;\n    opacity: 0.32;\n    filter: grayscale(0.35) contrast(1.05);\n    pointer-events: none;\n  }\n  .hero::before {\n    content: ''; position: absolute; inset: 0; z-index: 1;\n    background:\n      linear-gradient(90deg,\n        rgba(15,32,39,0.97) 0%,\n        rgba(15,32,39,0.88) 35%,\n        rgba(15,32,39,0.58) 70%,\n        rgba(15,32,39,0.42) 100%),\n      radial-gradient(ellipse 50% 40% at 10% 100%, rgba(143,201,114,0.07) 0%, transparent 60%);\n    pointer-events: none;\n  }\n  .hero::after {\n    content: ''; position: absolute; inset: 0; z-index: 1;\n    background: linear-gradient(180deg, transparent 0%, transparent 70%, rgba(15,32,39,0.5) 100%);\n    pointer-events: none;\n  }\n  .hero-inner {\n    max-width: 1280px; margin: 0 auto; width: 100%;\n    padding: 0 3rem;\n    display: grid; grid-template-columns: 1.4fr 1fr; gap: 5rem;\n    align-items: center; position: relative; z-index: 2;\n  }\n  .hero-eyebrow {\n    display: flex; align-items: center; gap: 0.85rem;\n    margin-bottom: 1.5rem;\n    font-size: 0.62rem; font-weight: 700;\n    letter-spacing: 0.28em; text-transform: uppercase;\n    color: var(--teal-light);\n  }\n  .hero-eyebrow::before {\n    content: ''; width: 1.75rem; height: 1px; background: var(--teal-light);\n  }\n  .hero h1 {\n    font-family: 'Playfair Display', serif;\n    font-size: clamp(2.4rem, 4vw, 4rem); font-weight: 500;\n    line-height: 1.08; color: var(--white);\n    letter-spacing: -0.015em; margin-bottom: 1.5rem;\n    max-width: 18ch;\n  }\n  .hero h1 em { font-style: italic; color: var(--leaf-light); }\n  .hero-sub {\n    font-family: 'Playfair Display', serif;\n    font-style: italic; font-size: 1.05rem;\n    color: rgba(255,255,255,0.7); line-height: 1.65;\n    max-width: 44ch; margin-bottom: 2.25rem;\n    font-weight: 400;\n  }\n  .hero-sub--plain {\n    font-family: 'DM Sans', sans-serif; font-style: normal;\n    font-size: 0.95rem; font-weight: 300; line-height: 1.8;\n    color: rgba(255,255,255,0.6); margin-bottom: 1.25rem;\n  }\n  .hero-actions {\n    display: flex; gap: 0.85rem; flex-wrap: wrap;\n    margin-bottom: 2.5rem;\n  }\n  .hero-sectors {\n    display: flex; flex-wrap: wrap; gap: 0.45rem;\n    padding-top: 1.5rem;\n    border-top: 1px solid rgba(255,255,255,0.08);\n  }\n  .hero-sector-tag {\n    font-size: 0.58rem; font-weight: 700;\n    letter-spacing: 0.18em; text-transform: uppercase;\n    color: var(--teal-light);\n    border: 1px solid rgba(0,191,165,0.28);\n    padding: 0.35rem 0.7rem; border-radius: 2px;\n    white-space: nowrap;\n  }\n  /* Hero right column — single stat anchor */\n  .hero-right {\n    display: flex; flex-direction: column;\n    align-items: flex-end; justify-content: center;\n    gap: 2rem;\n  }\n  .hero-stat {\n    text-align: right; padding: 1.5rem 0 1.5rem 2rem;\n    border-left: 1px solid rgba(255,255,255,0.1);\n    display: flex; flex-direction: column; gap: 0.6rem;\n    max-width: 24ch;\n  }\n  .hero-stat-num {\n    font-family: 'Playfair Display', serif;\n    font-size: clamp(2.4rem, 4vw, 3.6rem); font-weight: 500; line-height: 1;\n    color: var(--leaf-light); letter-spacing: -0.015em;\n  }\n  .hero-stat-lbl {\n    font-size: 0.66rem; font-weight: 600;\n    letter-spacing: 0.16em; text-transform: uppercase;\n    color: rgba(255,255,255,0.55); line-height: 1.7;\n  }\n\n  /* ─── SECTIONS ─── */\n  section { padding: 6.5rem 0; }\n  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 3rem; }\n  .sec-head {\n    display: grid; grid-template-columns: 1fr 1.4fr; gap: 4rem;\n    margin-bottom: 4rem; align-items: end;\n  }\n  .sec-eyebrow {\n    display: flex; align-items: center; gap: 0.75rem;\n    margin-bottom: 1rem;\n    font-size: 0.62rem; font-weight: 700;\n    letter-spacing: 0.28em; text-transform: uppercase;\n    color: var(--teal);\n  }\n  .sec-eyebrow::before {\n    content: ''; width: 1.5rem; height: 2px; background: var(--teal);\n  }\n  .sec-title {\n    font-family: 'Playfair Display', serif;\n    font-size: clamp(1.95rem, 3vw, 2.7rem);\n    font-weight: 500; line-height: 1.15;\n    color: var(--navy); letter-spacing: -0.01em;\n  }\n  .sec-title em { font-style: italic; color: var(--teal); }\n  .sec-blurb {\n    font-size: 0.95rem; color: var(--text-light); line-height: 1.85;\n    font-weight: 300; max-width: 52ch;\n  }\n  .sec-blurb strong { color: var(--navy); font-weight: 600; }\n\n  /* On-dark section */\n  .sec--dark { background: var(--navy); position: relative; overflow: hidden; }\n  .sec--dark::before {\n    content: ''; position: absolute; inset: 0;\n    background: radial-gradient(ellipse 50% 40% at 20% 110%, rgba(0,191,165,0.10) 0%, transparent 55%);\n    pointer-events: none;\n  }\n  .sec--dark .wrap { position: relative; z-index: 2; }\n  .sec--dark .sec-eyebrow { color: var(--teal-light); }\n  .sec--dark .sec-eyebrow::before { background: var(--teal-light); }\n  .sec--dark .sec-title { color: var(--white); }\n  .sec--dark .sec-title em { color: var(--leaf-light); }\n  .sec--dark .sec-blurb { color: rgba(255,255,255,0.65); }\n  .sec--dark .sec-blurb strong { color: var(--white); }\n\n  /* Reveal */\n  .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }\n  .reveal.visible { opacity: 1; transform: none; }\n  .reveal-d1 { transition-delay: 0.08s; }\n  .reveal-d2 { transition-delay: 0.16s; }\n  .reveal-d3 { transition-delay: 0.24s; }\n\n  /* ─── ABOUT ─── */\n  #about { background: var(--paper); }\n  .about-grid {\n    display: grid;\n    grid-template-columns: 1fr 1.2fr;\n    gap: 5rem;\n    align-items: start;\n  }\n  .about-left { position: sticky; top: 6rem; }\n  .about-left .sec-title { margin-top: 0.6rem; margin-bottom: 2rem; max-width: 14ch; }\n  .about-pull {\n    font-family: 'Playfair Display', serif;\n    font-size: 1.15rem; font-style: italic; font-weight: 500;\n    line-height: 1.55; color: var(--navy);\n    border-left: 2px solid var(--teal); padding-left: 1.5rem;\n    margin: 0 0 1.75rem; max-width: 32ch;\n  }\n  .about-right { padding-top: 0.5rem; }\n  .about-body {\n    font-size: 0.98rem; line-height: 1.9; color: var(--text-light);\n    font-weight: 300; margin-bottom: 1.5rem;\n  }\n  .about-body strong { color: var(--navy); font-weight: 600; }\n  .about-stats {\n    display: grid; grid-template-columns: repeat(3, 1fr);\n    gap: 1px;\n    background: var(--rule);\n    border: 1px solid var(--rule);\n    margin-top: 2.5rem;\n    border-radius: 3px;\n    overflow: hidden;\n  }\n  .about-stat {\n    background: var(--white);\n    padding: 1.5rem 1.25rem;\n    display: flex; flex-direction: column; gap: 0.5rem;\n  }\n  .about-stat-num {\n    font-family: 'Playfair Display', serif;\n    font-size: 2.2rem; font-weight: 500; line-height: 1;\n    color: var(--navy); letter-spacing: -0.015em;\n    display: inline-flex; align-items: baseline;\n  }\n  .about-stat-sym {\n    font-size: 1.2rem; color: var(--teal); margin-left: 0.05em;\n  }\n  .about-stat-lbl {\n    font-size: 0.7rem; font-weight: 600;\n    letter-spacing: 0.08em; color: var(--text-light);\n    line-height: 1.55;\n  }\n  .linkedin-link {\n    display: inline-flex; align-items: center; gap: 0.45rem;\n    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em;\n    color: var(--teal); text-decoration: none; transition: color 0.2s;\n    text-transform: uppercase;\n  }\n  .linkedin-link:hover { color: var(--navy); }\n\n  /* ─── SERVICES ─── */\n  #services { background: var(--navy); position: relative; overflow: hidden; }\n  #services::before {\n    content: ''; position: absolute; inset: 0;\n    background: radial-gradient(ellipse 50% 40% at 90% 0%, rgba(0,191,165,0.10) 0%, transparent 55%);\n    pointer-events: none;\n  }\n  #services .wrap { position: relative; z-index: 2; }\n  #services .sec-eyebrow { color: var(--teal-light); }\n  #services .sec-eyebrow::before { background: var(--teal-light); }\n  #services .sec-title { color: var(--white); }\n  #services .sec-title em { color: var(--leaf-light); }\n  #services .sec-blurb { color: rgba(255,255,255,0.65); }\n  .services-grid {\n    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;\n    background: rgba(255,255,255,0.06);\n    border: 1px solid rgba(255,255,255,0.06);\n  }\n  .svc-card {\n    background: rgba(255,255,255,0.025); padding: 2.5rem 2.25rem;\n    position: relative; overflow: hidden;\n    transition: background 0.25s;\n    display: flex; flex-direction: column;\n  }\n  .svc-card::before {\n    content: ''; position: absolute; top: 0; left: 0;\n    width: 2px; height: 0; background: var(--teal-light);\n    transition: height 0.35s ease;\n  }\n  .svc-card:hover::before { height: 100%; }\n  .svc-card:hover { background: rgba(0,191,165,0.06); }\n  .svc-num {\n    font-family: 'Playfair Display', serif;\n    font-size: 1.1rem; font-style: italic; color: var(--teal-light);\n    margin-bottom: 1.5rem;\n  }\n  .svc-title {\n    font-family: 'Playfair Display', serif;\n    font-size: 1.2rem; font-weight: 500; color: var(--white);\n    line-height: 1.3; margin-bottom: 0.45rem;\n  }\n  .svc-tag {\n    font-size: 0.62rem; font-weight: 700; letter-spacing: 0.16em;\n    text-transform: uppercase; color: var(--teal-light);\n    margin-bottom: 1.25rem;\n  }\n  .svc-desc {\n    font-size: 0.85rem; font-weight: 300;\n    color: rgba(255,255,255,0.55); line-height: 1.75;\n    margin-bottom: 1.5rem; flex: 1;\n  }\n  .svc-toggle {\n    display: flex; align-items: center; gap: 0.5rem;\n    margin-top: 0.75rem;\n    background: none; border: 1px solid rgba(255,255,255,0.14);\n    border-radius: 2px; padding: 0.6rem 0.95rem; cursor: pointer;\n    width: 100%;\n    font-family: 'DM Sans', sans-serif;\n    font-size: 0.6rem; font-weight: 700;\n    letter-spacing: 0.14em; text-transform: uppercase;\n    color: rgba(255,255,255,0.55);\n    transition: border-color 0.2s, color 0.2s;\n  }\n  .svc-toggle:hover { border-color: var(--teal-light); color: var(--teal-light); }\n  .svc-toggle[aria-expanded=\"true\"] { border-color: var(--teal-light); color: var(--teal-light); }\n  .svc-toggle-label { flex: 1; text-align: left; }\n  .svc-toggle-icon { flex-shrink: 0; transition: transform 0.25s ease; }\n  .svc-toggle[aria-expanded=\"true\"] .svc-toggle-icon { transform: rotate(180deg); }\n  .svc-drawer {\n    overflow: hidden; max-height: 0; opacity: 0;\n    transition: max-height 0.35s ease, opaci ner { grid-template-columns: 1fr; gap: 2.5rem; padding: 0 1.25rem; }\n    .hero-sub { font-size: 1rem; max-width: 100%; }\n    .hero-actions { flex-direction: column; align-items: stretch; gap: 0.65rem; }\n    .hero-actions .btn { text-align: center; }\n    .hero-right { align-items: stretch; gap: 1.5rem; }\n    .hero-stat { text-align: left; border-left: none; border-top: 1px solid rgba(255,255,255,0.08); padding: 1.5rem 0 0; max-width: 100%; }\n\n    .services-grid { grid-template-columns: 1fr; }\n    .svc-card { padding: 1.75rem 1.5rem; }\n\n    .problems-grid { grid-template-columns: 1fr; }\n    .problem-card { padding: 1.75rem 1.5rem; }\n    .landscape-pull { flex-direction: column; align-items: flex-start; }\n\n    .for-grid { grid-template-columns: 1fr; }\n    .for-item { padding: 1.25rem; }\n\n    .results-grid { grid-template-columns: 1fr; }\n    .result-card { padding: 1.75rem 1.5rem; }\n    .result-metrics { gap: 1.25rem; }\n\n    .insights-header { flex-direction: column; align-items: flex-start; gap: 1rem; }\n    .insights-header p { text-align: left; max-width: 100%; }\n    .insights-grid { grid-template-columns: 1fr; }\n\n    .contact-grid { grid-template-columns: 1fr; gap: 2rem; }\n    .form-card { padding: 1.5rem; }\n\n    .footer-main { grid-template-columns: 1fr 1fr; gap: 2rem; padding: 2.5rem 1.25rem 2rem; }\n    .footer-brand { grid-column: 1 / -1; }\n    .footer-tagline { max-width: 100%; }\n    .footer-bottom { padding: 1.25rem; flex-direction: column; gap: 0.7rem; text-align: center; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- Splash thumbnail (shown while bundle unpacks; also no-JS fallback) -->\n\n\n\n<!-- ============================== -->\n\n\n\n<!-- NAV -->\n<nav class=\"site-nav\">\n  <a href=\"#\" class=\"nav-brand\">\n    <img class=\"brand-logo brand-logo--nav\" src=\"9c706a7d-a24b-42f6-bfa0-9309dfbb243f\" alt=\"MPS | CreateValue\" width=\"240\" height=\"44\">\n  <\u002Fa>\n  <ul class=\"nav-links\">\n    <li><a href=\"#about\">About<\u002Fa><\u002Fli>\n    <li><a href=\"#services\">Services<\u002Fa><\u002Fli>\n    <li><a href=\"#landscape\">The Landscape<\u002Fa><\u002Fli>\n    <li><a href=\"#results\">Results<\u002Fa><\u002Fli>\n    <li><a href=\"#insights\">Insights<\u002Fa><\u002Fli>\n    <li><a href=\"#contact\" class=\"nav-cta\">Get in Touch<\u002Fa><\u002Fli>\n  <\u002Ful>\n  <button class=\"nav-toggle\" id=\"menuToggle\" aria-label=\"Open menu\">\n    <span><\u002Fspan><span><\u002Fspan><span><\u002Fspan>\n  <\u002Fbutton>\n<\u002Fnav>\n\n<div class=\"nav-drawer\" id=\"navDrawer\">\n  <button class=\"drawer-close\" id=\"drawerClose\" aria-label=\"Close menu\">×<\u002Fbutton>\n  <ul>\n    <li><a href=\"#about\">About<\u002Fa><\u002Fli>\n    <li><a href=\"#services\">Services<\u002Fa><\u002Fli>\n    <li><a href=\"#landscape\">The Landscape<\u002Fa><\u002Fli>\n    <li><a href=\"#results\">Results<\u002Fa><\u002Fli>\n    <li><a href=\"#insights\">Insights<\u002Fa><\u002Fli>\n    <li><a href=\"#contact\" class=\"cta-mobile\">Start a Conversation →<\u002Fa><\u002Fli>\n  <\u002Ful>\n<\u002Fdiv>\n\n<!-- HERO -->\n<header class=\"hero\">\n  <div class=\"hero-bg\"><\u002Fdiv>\n  <div class=\"hero-inner\">\n    <div>\n      <div class=\"hero-eyebrow\">Value-Added · Agrifood · FoodTech Advisory<\u002Fdiv>\n      <h1>Advisory for Canadian food &amp; agrifood <em>owners.<\u002Fem><\u002Fh1>\n      <p class=\"hero-sub\">Funding is the fuel. Compound value is the flywheel.<\u002Fp>\n      <p class=\"hero-sub--plain\">We help founders and business owners access capital, navigate growth, and build a business that compounds — not one that resets.<\u002Fp>\n      <div class=\"hero-actions\">\n        <a href=\"#contact\" class=\"btn btn--accent\">Start a Conversation<\u002Fa>\n        <a href=\"#services\" class=\"btn btn--ghost-light\">How We Work<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"hero-sectors\">\n        <span class=\"hero-sector-tag\">Food &amp; Bev<\u002Fspan>\n        <span class=\"hero-sector-tag\">Agrifood<\u002Fspan>\n        <span class=\"hero-sector-tag\">Functional<\u002Fspan>\n        <span class=\"hero-sector-tag\">FoodTech<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hero-right\">\n      <div class=\"hero-stat\">\n        <span class=\"hero-stat-num\">$100M+<\u002Fspan>\n        <span class=\"hero-stat-lbl\">Supported · 6 countries · est. 2014<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ABOUT -->\n<section id=\"about\">\n  <div class=\"wrap\">\n    <div class=\"about-grid\">\n      <div class=\"about-left\">\n        <div class=\"sec-eyebrow reveal\">About<\u002Fdiv>\n        <h2 class=\"sec-title reveal reveal-d1\">Your food business advisor who <em>thinks with you.<\u002Fem><\u002Fh2>\n        <p class=\"about-pull reveal reveal-d2\">\"For us it's never just about finding growth capital, or solving the immediate problem. It's about understanding what you are building, why it matters, and what it needs to compound.\"<\u002Fp>\n        <address style=\"font-style:normal;display:inline;\">\n          <a href=\"https://www.linkedin.com/in/werner-m%C3%BCller\" target=\"_blank\" rel=\"noopener\" class=\"linkedin-link reveal reveal-d3\">Connect on LinkedIn ↗<\u002Fa>\n        <\u002Faddress>\n      <\u002Fdiv>\n      <div class=\"about-right\">\n        <p class=\"about-body reveal reveal-d2\">The decisions that matter most tend to fall between your accountant and your bank, between this year and the next five. That's where we work — thinking alongside you, helping you see the full picture, and making sure the moves you make today still look smart three years from now.<\u002Fp>\n        <p class=\"about-body reveal reveal-d3\"><strong>Werner Müller<\u002Fstrong> founded MPS | CreateValue after more than a decade working alongside food business owners across six countries. Different markets, different stages — but the same gap every time: owners doing real work, without someone who actually understood what they were trying to build.<\u002Fp>\n        <div class=\"about-stats reveal reveal-d3\">\n          <div class=\"about-stat\">\n            <span class=\"about-stat-num\">11<span class=\"about-stat-sym\">+<\u002Fspan><\u002Fspan>\n            <span class=\"about-stat-lbl\">Years advising food &amp; agrifood businesses<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"about-stat\">\n            <span class=\"about-stat-num\">6<\u002Fspan>\n            <span class=\"about-stat-lbl\">Countries served<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"about-stat\">\n            <span class=\"about-stat-num\">2014<\u002Fspan>\n            <span class=\"about-stat-lbl\">Year MPS | CreateValue was founded<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SERVICES -->\n<section id=\"services\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div>\n        <div class=\"sec-eyebrow reveal\">What We Offer<\u002Fdiv>\n        <h2 class=\"sec-title reveal reveal-d1\">Four ways we <em>work together.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"sec-blurb reveal reveal-d2\">Food &amp; agrifood advisory for every stage of the journey — from a founder's first investor cheque to an owner's planned exit.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"services-grid\">\n\n      <!-- Card 1 -->\n      <article class=\"svc-card reveal reveal-d1\">\n        <div class=\"svc-num\">01<\u002Fdiv>\n        <h3 class=\"svc-title\">Startup Founder — 1st Investor Cheque<\u002Fh3>\n        <div class=\"svc-tag\">For Accelerator Programs.<\u002Fdiv>\n        <p class=\"svc-desc\">We support start and scale-up programming through webinars, workshops and advisory — focused on preparing founders for their first investment conversation.<\u002Fp>\n        <button class=\"svc-toggle\" onclick=\"toggleSvc(this)\" aria-expanded=\"false\">\n          <span class=\"svc-toggle-label\">What's included<\u002Fspan>\n          <svg class=\"svc-toggle-icon\" viewBox=\"0 0 16 16\" fill=\"none\" width=\"13\" height=\"13\"><path d=\"M3 6l5 5 5-5\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <div class=\"svc-drawer\">\n          <ul class=\"svc-items\">\n            <li>How investors read your numbers<\u002Fli>\n            <li>Capital types, instruments, and investors<\u002Fli>\n            <li>Valuation vs dilution + simple CAP table<\u002Fli>\n            <li>Investment roadmap: Angel → Seed<\u002Fli>\n            <li>Non-dilutive vs dilutive — used strategically<\u002Fli>\n            <li>Deliberately building toward an acquisition<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- Card 2 -->\n      <article class=\"svc-card reveal reveal-d2\">\n        <div class=\"svc-num\">02<\u002Fdiv>\n        <h3 class=\"svc-title\">$350K+ in Growth Capital<\u002Fh3>\n        <div class=\"svc-tag\">Can I. Should I. What if.<\u002Fdiv>\n        <p class=\"svc-desc\">Most capital conversations start with \"how do we get this funded.\" We start earlier — with whether you should, on what terms, and what it means for everything that follows.<\u002Fp>\n        <button class=\"svc-toggle\" onclick=\"toggleSvc(this)\" aria-expanded=\"false\">\n          <span class=\"svc-toggle-label\">What's included<\u002Fspan>\n          <svg class=\"svc-toggle-icon\" viewBox=\"0 0 16 16\" fill=\"none\" width=\"13\" height=\"13\"><path d=\"M3 6l5 5 5-5\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <div class=\"svc-drawer\">\n          <ul class=\"svc-items\">\n            <li>Business plans, financial projections, scenario modeling<\u002Fli>\n            <li>Feasibility studies — ventures, processing, market entry<\u002Fli>\n            <li>Growth capital strategy — positioning, readiness, access<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- Card 3 -->\n      <article class=\"svc-card reveal reveal-d2\">\n        <div class=\"svc-num\">03<\u002Fdiv>\n        <h3 class=\"svc-title\">Growth that compounds<\u002Fh3>\n        <div class=\"svc-tag\">Growth that builds on itself.<\u002Fdiv>\n        <p class=\"svc-desc\">Getting funded is the start, not the finish. We stay alongside you — helping every decision that follows create value that carries forward, not just results that reset.<\u002Fp>\n        <button class=\"svc-toggle\" onclick=\"toggleSvc(this)\" aria-expanded=\"false\">\n          <span class=\"svc-toggle-label\">What's included<\u002Fspan>\n          <svg class=\"svc-toggle-icon\" viewBox=\"0 0 16 16\" fill=\"none\" width=\"13\" height=\"13\"><path d=\"M3 6l5 5 5-5\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <div class=\"svc-drawer\">\n          <ul class=\"svc-items\">\n            <li>Navigate transitions — producer → processor, regional → national<\u002Fli>\n            <li>Fill the gaps without hiring ahead of where you are<\u002Fli>\n            <li>Make sure every move builds on the last<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- Card 4 -->\n      <article class=\"svc-card reveal reveal-d3\">\n        <div class=\"svc-num\">04<\u002Fdiv>\n        <h3 class=\"svc-title\">Exit Readiness — Sell on Your Terms<\u002Fh3>\n        <div class=\"svc-tag\">For owners thinking about what comes next.<\u002Fdiv>\n        <p class=\"svc-desc\">Most food businesses aren't structured for an exit — the financials aren't clean, the story isn't buyer-ready, and the value hasn't been surfaced. We run a 24–36 month program to change that.<\u002Fp>\n        <button class=\"svc-toggle\" onclick=\"toggleSvc(this)\" aria-expanded=\"false\">\n          <span class=\"svc-toggle-label\">What's included<\u002Fspan>\n          <svg class=\"svc-toggle-icon\" viewBox=\"0 0 16 16\" fill=\"none\" width=\"13\" height=\"13\"><path d=\"M3 6l5 5 5-5\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <div class=\"svc-drawer\">\n          <ul class=\"svc-items\">\n            <li>Financial normalisation — buyer-readable performance<\u002Fli>\n            <li>Buyer-ready strategic narrative and growth story<\u002Fli>\n            <li>Buyer profile identification + pre-sale relationship<\u002Fli>\n            <li>Deal structure guidance — terms, timing, when to walk<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- THE LANDSCAPE -->\n<section id=\"landscape\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div>\n        <div class=\"sec-eyebrow reveal\">The Canadian Food Landscape<\u002Fdiv>\n        <h2 class=\"sec-title reveal reveal-d1\">Four problems hold most Canadian food businesses <em>back from scaling.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"sec-blurb reveal reveal-d2\">The same barriers come up again and again. Our advisory is built to solve exactly these four.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"problems-grid reveal reveal-d2\">\n      <article class=\"problem-card\">\n        <div class=\"problem-num\">Problem One<\u002Fdiv>\n        <h3 class=\"problem-title\">Most startup founders don't know how to plan for their first investor cheque<\u002Fh3>\n        <p class=\"problem-body\">Most founders don't lack ambition — they lack the investor lens and capital literacy to build a deliberate path to funding.<\u002Fp>\n        <div class=\"problem-stats\">\n          <div class=\"problem-stat\">\n            <span class=\"problem-stat-label\">Investor Lens<\u002Fspan>\n            <span class=\"problem-stat-text\">How investors read your numbers — and what signals matter.<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"problem-stat\">\n            <span class=\"problem-stat-label\">Capital Roadmap<\u002Fspan>\n            <span class=\"problem-stat-text\">Capital types, valuation vs dilution, CAP tables — Angel to Seed.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"problem-card\">\n        <div class=\"problem-num\">Problem Two<\u002Fdiv>\n        <h3 class=\"problem-title\">Growth capital is available — but most owners can't access it<\u002Fh3>\n        <p class=\"problem-body\">The money is there. The gap is positioning — most owners arrive unprepared, or asking for the wrong thing.<\u002Fp>\n        <div class=\"problem-stats\">\n          <div class=\"problem-stat\">\n            <span class=\"problem-stat-num\">$140B+<\u002Fspan>\n            <span class=\"problem-stat-sub\">Sector size — capital is here<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"problem-stat\">\n            <span class=\"problem-stat-num\">$2M–$20M<\u002Fspan>\n            <span class=\"problem-stat-sub\">Where most food businesses stall<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"problem-card\">\n        <div class=\"problem-num\">Problem Three<\u002Fdiv>\n        <h3 class=\"problem-title\">Most food businesses grow in bursts — but the wins don't stick<\u002Fh3>\n        <p class=\"problem-body\">Good years. Smart hires. Product launches. But without a thread connecting the wins, you rebuild from the same place each time.<\u002Fp>\n        <div class=\"problem-stats\">\n          <div class=\"problem-stat\">\n            <span class=\"problem-stat-label\">Data-Driven Growth<\u002Fspan>\n            <span class=\"problem-stat-text\">Where growth is coming from — and where it's leaking out.<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"problem-stat\">\n            <span class=\"problem-stat-label\">Human-Designed<\u002Fspan>\n            <span class=\"problem-stat-text\">Built around your team — not just the strategy.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"problem-card\">\n        <div class=\"problem-num\">Problem Four<\u002Fdiv>\n        <h3 class=\"problem-title\">Most owners build a business — but not one they can sell<\u002Fh3>\n        <p class=\"problem-body\">Most food owners haven't structured for an exit. The financials aren't clean, the story isn't buyer-ready, and the value hasn't been surfaced.<\u002Fp>\n        <div class=\"problem-stats\">\n          <div class=\"problem-stat\">\n            <span class=\"problem-stat-label\">Clean Financials<\u002Fspan>\n            <span class=\"problem-stat-text\">Restructured so buyers see the business as it actually performs.<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"problem-stat\">\n            <span class=\"problem-stat-label\">Buyer-Ready Story<\u002Fspan>\n            <span class=\"problem-stat-text\">The right narrative and terms — built before the conversation starts.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fdiv>\n\n    <div class=\"landscape-pull reveal reveal-d2\">\n      <p>\"The owners who win aren't the ones who work harder. They're the ones whose decisions compound.\"<\u002Fp>\n      <a href=\"#services\" class=\"btn btn--ghost-light\" style=\"border-color:rgba(0,191,165,0.35); color:var(--teal-light);\">See How We Work →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- RESULTS -->\n<section id=\"results\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div>\n        <div class=\"sec-eyebrow reveal\">Client Results<\u002Fdiv>\n        <h2 class=\"sec-title reveal reveal-d1\">Food business advisory<br><em>results that speak for themselves.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"results-grid\">\n\n      <article class=\"result-card reveal reveal-d1\">\n        <div class=\"result-sector\">Value-Added Food Processing<\u002Fdiv>\n        <div class=\"result-badge\">Diversified Food Business Group<\u002Fdiv>\n        <div class=\"result-metrics\">\n          <div>\n            <span class=\"result-metric-num\">$300K→$22M<\u002Fspan>\n            <span class=\"result-metric-lbl\">Business value<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <span class=\"result-metric-num\">2.5 yrs<\u002Fspan>\n            <span class=\"result-metric-lbl\">Partnership<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"result-quote\">\"Originally starting my business with a $300,000 investment, Werner has been my advisor for the last 2.5 years — helping me fund and build out a diversified business group now worth $22M.\"<\u002Fp>\n        <div class=\"result-role\">Business Owner · Diversified Food Business Group<\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"result-card reveal reveal-d2\">\n        <div class=\"result-sector\">Agrifood · Value-Added Processing<\u002Fdiv>\n        <div class=\"result-badge\">Value-Added Processor<\u002Fdiv>\n        <div class=\"result-metrics\">\n          <div>\n            <span class=\"result-metric-num\">$1.8M<\u002Fspan>\n            <span class=\"result-metric-lbl\">Modernization invested<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <span class=\"result-metric-num\">Exit<\u002Fspan>\n            <span class=\"result-metric-lbl\">Targeted 2–3 years<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"result-quote\">\"Working with Werner for more than 3 years, he helped us invest $1.8M in modernization, restructure strategically, and position for a planned exit in the next 2 to 3 years.\"<\u002Fp> "_blank\" rel=\"noopener\">Nadarra Ventures<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- INSIGHTS -->\n<section id=\"insights\">\n  <div class=\"wrap\">\n    <div class=\"sec-eyebrow reveal\">Insights<\u002Fdiv>\n    <div class=\"insights-header reveal reveal-d1\">\n      <h2 class=\"sec-title\">Thinking out loud on <em>Canadian food business.<\u002Fem><\u002Fh2>\n      <p>Capital, growth, and exits — for founders and owners in the sector.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"insights-grid reveal reveal-d2\">\n\n      <a href=\"insights/bdc-fcc-financing-canadian-food-businesses.html\" class=\"insight-card\">\n        <div class=\"insight-tag\">Capital Strategy<\u002Fdiv>\n        <div class=\"insight-title\">How Canadian food businesses access BDC and FCC financing — and what most get wrong<\u002Fdiv>\n        <p class=\"insight-excerpt\">The money is there. Most owners lose the deal in the preparation, not the pitch.<\u002Fp>\n        <div class=\"insight-meta\">\n          <span class=\"insight-read\">8 min read<\u002Fspan>\n          <span class=\"insight-arrow\">→<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <a href=\"insights/exit-planning-food-business.html\" class=\"insight-card\">\n        <div class=\"insight-tag\">Exit Planning<\u002Fdiv>\n        <div class=\"insight-title\">Exit planning for food business owners — what buyers actually look at<\u002Fdiv>\n        <p class=\"insight-excerpt\">Buyers aren't buying your past. The gap between those two timelines is where most value gets left behind.<\u002Fp>\n        <div class=\"insight-meta\">\n          <span class=\"insight-read\">9 min read<\u002Fspan>\n          <span class=\"insight-arrow\">→<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <a href=\"insights/investor-readiness-food-startup.html\" class=\"insight-card\">\n        <div class=\"insight-tag\">Investor Readiness<\u002Fdiv>\n        <div class=\"insight-title\">Investor readiness for food startup founders — landing the first cheque<\u002Fdiv>\n        <p class=\"insight-excerpt\">How to read your numbers like an investor and build a deliberate capital roadmap from where you are.<\u002Fp>\n        <div class=\"insight-meta\">\n          <span class=\"insight-read\">8 min read<\u002Fspan>\n          <span class=\"insight-arrow\">→<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <a href=\"insights/grow-food-business-compound-growth.html\" class=\"insight-card\">\n        <div class=\"insight-tag\">Growth Strategy<\u002Fdiv>\n        <div class=\"insight-title\">How to grow a food business without losing what you've built<\u002Fdiv>\n        <p class=\"insight-excerpt\">Growth in food is easy to get wrong. The businesses that compound share one characteristic — every decision builds on the last.<\u002Fp>\n        <div class=\"insight-meta\">\n          <span class=\"insight-read\">7 min read<\u002Fspan>\n          <span class=\"insight-arrow\">→<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <a href=\"insights/agrifood-strategic-planning-canada.html\" class=\"insight-card\">\n        <div class=\"insight-tag\">Strategic Planning<\u002Fdiv>\n        <div class=\"insight-title\">Agrifood strategic planning in Canada — from vision to execution<\u002Fdiv>\n        <p class=\"insight-excerpt\">Most agrifood organisations produce good strategies. Fewer execute them. The gap is structural, not intentional.<\u002Fp>\n        <div class=\"insight-meta\">\n          <span class=\"insight-read\">7 min read<\u002Fspan>\n          <span class=\"insight-arrow\">→<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <a href=\"insights/capital-types-canadian-food-businesses.html\" class=\"insight-card\">\n        <div class=\"insight-tag\">Capital · Finance<\u002Fdiv>\n        <div class=\"insight-title\">Capital types for Canadian food businesses — debt, equity, and non-dil istener('click', e => {\n      const id = link.getAttribute('href');\n      if (!id || id === '#') return;\n      const target = document.querySelector(id);\n      if (!target) return;\n      e.preventDefault();\n      const top = target.getBoundingClientRect().top + window.scrollY - 70;\n      window.scrollTo({ top, behavior: 'smooth' });\n    });\n  });\n\n  // Mobile nav\n  const toggle = document.getElementById('menuToggle');\n  const drawer = document.getElementById('navDrawer');\n  const closeBtn = document.getElementById('drawerClose');\n  toggle.addEventListener('click', () => {\n    drawer.classList.toggle('open');\n    document.body.style.overflow = drawer.classList.contains('open') ? 'hidden' : '';\n  });\n  closeBtn.addEventListener('click', () => {\n    drawer.classList.remove('open'); document.body.style.overflow = '';\n  });\n  drawer.querySelectorAll('a').forEach(a => {\n    a.addEventListener('click', () => { drawer.classList.remove('open'); document.body.style.overflow = ''; });\n  });\n\n  // Contact form\n  const form = document.getElementById('contactForm');\n  if (form) {\n    const nameInput = document.getElementById('name');\n    const emailInput = document.getElementById('email');\n    const nameError = document.getElementById('nameError');\n    const emailError = document.getElementById('emailError');\n    const submitBtn = document.getElementById('submitBtn');\n    const submitLabel = document.getElementById('submitLabel');\n    const submitSpinner = document.getElementById('submitSpinner');\n\n    nameInput.addEventListener('input', () => { nameInput.classList.remove('invalid'); nameError.classList.remove('visible'); });\n    emailInput.addEventListener('input', () => { emailInput.classList.remove('invalid'); emailError.classList.remove('visible'); });\n\n    form.addEventListener('submit', async (e) => {\n      e.preventDefault();\n      let valid = true;\n      if (!nameInput.value.trim()) { nameInput.classList.add('invalid'); nameError.classList.add('visible'); valid = false; }\n      if (!/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(emailInput.value.trim())) { emailInput.classList.add('invalid'); emailError.classList.add('visible'); valid = false; }\n      if (!valid) return;\n      submitBtn.disabled = true;\n      submitLabel.style.display = 'none';\n      submitSpinner.style.display = 'inline-block';\n      try {\n        const res = await fetch(form.action, { method: 'POST', body: new FormData(form), headers: { 'Accept': 'application/json' } });\n        if (res.ok) {\n          document.getElementById('formDefault').style.display = 'none';\n          document.getElementById('formSuccess').style.display = 'flex';\n        } else throw new Error();\n      } catch {\n        document.getElementById('formDefault').style.display = 'none';\n        document.getElementById('formError').style.display = 'flex';\n      }\n    });\n  }\n\n  // Service card toggles\n  function toggleSvc(btn) {\n    const drawer = btn.nextElementSibling;\n    const isOpen = drawer.classList.contains('open');\n    drawer.classList.toggle('open', !isOpen);\n    btn.setAttribute('aria-expanded', String(!isOpen));\n  }\n\n  // Accordion toggles\n  function toggleAccordion(btn) {\n    const body = btn.nextElementSibling;\n    const icon = btn.querySelector('.accordion-icon');\n    const isOpen = body.style.display === 'block';\n    body.style.display = isOpen ? 'none' : 'block';\n    if (icon) icon.style.transform = isOpen ? '' : 'rotate(180deg)';\n  }\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
